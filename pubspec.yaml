name: shabdlok
description: "ShabdLok - A word puzzle game. Fill in the crossword by swiping letters."
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.3.1
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
